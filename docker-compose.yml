version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: belavia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: belavia
      POSTGRES_PASSWORD: belavia
      POSTGRES_DB: belavia
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U belavia -d belavia']
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
