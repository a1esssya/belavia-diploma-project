version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: belavia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belavia}
      POSTGRES_USER: ${POSTGRES_USER:-belavia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belavia}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:22-alpine
    container_name: belavia-backend
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npm run start:dev"
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-belavia}:${POSTGRES_PASSWORD:-belavia}@postgres:5432/${POSTGRES_DB:-belavia}?schema=public
      PORT: ${BACKEND_PORT:-3000}
    volumes:
      - ./backend:/app
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    depends_on:
      - postgres

  frontend:
    image: node:22-alpine
    container_name: belavia-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - frontend/.env.example
    volumes:
      - ./frontend:/app
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
